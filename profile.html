<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - Profile</title>
  <link rel="stylesheet" href="dashboard.css">
</head>

<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>SGIS</h1>
      <p>Smart Governance<br>Intelligence System</p>
    </div>

    <div class="sidebar-user" id="sidebarUser"></div>

    <nav class="sidebar-nav">
      <a href="user-dashboard.html">📊 Dashboard</a>
      <a href="my-complaints.html">📋 My Complaints</a>
      <a href="submit-complaint.html">➕ Submit Complaint</a>
      <a href="profile.html" class="active">👤 Profile</a>
    </nav>

    <div class="sidebar-bottom">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">

      <!-- HEADER -->
      <div style="margin-bottom: 30px;">
        <h2>Profile</h2>
        <p style="color:#666;">Manage your personal information</p>
      </div>

      <!-- USER INFO CARD -->
      <div class="card">
        <h3 style="margin-bottom:15px;">👤 Account Info</h3>

        <div style="display:flex; gap:15px; flex-wrap:wrap;">
          <input id="editName" class="form-input" placeholder="Full Name" style="flex:1;" />
          <input id="editEmail" class="form-input" disabled style="flex:1;" />
        </div>

        <div style="display:flex; gap:15px; margin-top:15px;">
          <input id="editPhone" class="form-input" placeholder="Phone Number" style="flex:1;" />
          <input id="editAddress" class="form-input" placeholder="Address" style="flex:1;" />
        </div>

        <button class="primary-btn" onclick="saveProfile()" style="margin-top:20px;">
          Update Profile
        </button>
      </div>

      <!-- PASSWORD CARD -->
      <div class="card" style="margin-top:25px;">
        <h3 style="margin-bottom:15px;">🔒 Change Password</h3>

        <div style="display:flex; gap:15px;">
          <input type="password" id="oldPass" class="form-input" placeholder="Current Password" style="flex:1;" />
          <input type="password" id="newPass" class="form-input" placeholder="New Password" style="flex:1;" />
        </div>

        <button class="danger-btn" onclick="changePassword()" style="margin-top:20px;">
          Change Password
        </button>
      </div>

    </div>
  </main>

  <script src="api.js"></script>

  <script>
    requireLogin();

    const user = getUser();
    document.getElementById("sidebarUser").textContent = "logged in as: " + user.email;

    async function loadProfile() {
      const result = await apiCall("/profile");
      if (!result || !result.ok) return;

      const u = result.data;

      document.getElementById("editName").value = u.name || "";
      document.getElementById("editEmail").value = u.email || "";
      document.getElementById("editPhone").value = u.phone || "";
      document.getElementById("editAddress").value = u.address || "";
    }

    async function saveProfile() {
      const fullName = document.getElementById("editName").value;
      const phone = document.getElementById("editPhone").value;
      const address = document.getElementById("editAddress").value;

      const result = await apiCall("/profile", "PUT", { name: fullName, phone, address });

      if (result && result.ok) {
        showAlert("✅ Profile updated!");
      } else {
        showAlert("Update failed", true);
      }
    }

    async function changePassword() {
      const oldPassword = document.getElementById("oldPass").value;
      const newPassword = document.getElementById("newPass").value;

      if (!oldPassword || !newPassword) {
        showAlert("Fill both fields", true);
        return;
      }

      const result = await apiCall("/change-password", "PUT", { oldPassword, newPassword });

      if (result && result.ok) {
        showAlert("✅ Password changed!");
        document.getElementById("oldPass").value = "";
        document.getElementById("newPass").value = "";
      } else {
        showAlert(result?.data?.message || "Error", true);
      }
    }

    loadProfile();
  </script>

</body>
</html>
