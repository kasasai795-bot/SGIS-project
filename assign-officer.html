<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - Assign Officer</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SGIS</h1><p>Smart Governance<br>Intelligence System</p></div>
    <div class="sidebar-user" id="sidebarUser"></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="admin-complaints.html">📋 All Complaints</a>
      <a href="assign-officer.html" class="active">➕ Assign Officer</a>
      <a href="manage-users.html">👥 Manage Users</a>
      <a href="reports.html">📄 View Reports</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">
      <h2>Assign Officer to Complaint</h2>
      <div class="form-container" style="max-width:600px;">

        <div class="form-group">
          <label>Select Complaint</label>
          <select id="complaintSelect" class="form-input" onchange="loadComplaintDetails()">
            <option value="">Loading complaints...</option>
          </select>
        </div>

        <div id="complaintInfo" style="display:none; background:#f5f0e8; padding:12px; border-radius:8px; margin:16px 0;">
          <p><strong>Status:</strong> <span id="infoStatus"></span></p>
          <p><strong>Category:</strong> <span id="infoCategory"></span></p>
          <p><strong>Submitted by:</strong> <span id="infoSubmitter"></span></p>
          <p><strong>Description:</strong> <span id="infoDesc"></span></p>
        </div>

        <div class="form-group">
          <label>Officer Name</label>
          <input type="text" id="officerName" class="form-input" placeholder="e.g. John Smith" />
        </div>

        <div class="form-group">
          <label>Department</label>
          <select id="department" class="form-input">
            <option value="">Select Department</option>
            <option>Water Department</option>
            <option>Infrastructure</option>
            <option>Sanitation</option>
            <option>Electricity Board</option>
            <option>General Administration</option>
          </select>
        </div>

        <button type="button" class="login-btn" onclick="assignOfficer()">Assign Officer</button>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    requireAdmin();
    document.getElementById("sidebarUser").textContent = "logged in as: " + getUser().email;

    let complaints = [];

    async function load() {
      const result = await apiCall("/admin/complaints");
      if (!result || !result.ok) return;
      complaints = (result.data || []).filter(c => c.status !== "Resolved");
      const select = document.getElementById("complaintSelect");
      select.innerHTML = '<option value="">-- Select a complaint --</option>' +
        complaints.map(c => `<option value="${c._id}">${c._id.slice(-6).toUpperCase()} — ${c.title}</option>`).join("");

      const urlId = new URLSearchParams(window.location.search).get("id");
      if (urlId) { select.value = urlId; loadComplaintDetails(); }
    }

    function loadComplaintDetails() {
      const id = document.getElementById("complaintSelect").value;
      if (!id) { document.getElementById("complaintInfo").style.display = "none"; return; }
      const c = complaints.find(x => x._id === id);
      if (!c) return;
      document.getElementById("complaintInfo").style.display = "block";
      document.getElementById("infoStatus").innerHTML = statusBadge(c.status);
      document.getElementById("infoCategory").textContent = c.category;
      document.getElementById("infoSubmitter").textContent = c.submittedBy || "—";
      document.getElementById("infoDesc").textContent = c.description;
    }

    async function assignOfficer() {
      const complaintId = document.getElementById("complaintSelect").value;
      const officerName = document.getElementById("officerName").value.trim();
      const department  = document.getElementById("department").value;

      if (!complaintId || !officerName || !department) {
        showAlert("Please fill in all fields", true); return;
      }

      const result = await apiCall("/admin/assign-officer", "POST", { complaintId, officerName, department });
      if (result && result.ok) {
        showAlert("✅ Officer assigned!");
        document.getElementById("officerName").value = "";
        document.getElementById("department").value = "";
        document.getElementById("complaintInfo").style.display = "none";
        document.getElementById("complaintSelect").value = "";
        load();
      } else {
        showAlert(result?.message || "Error assigning officer", true);
      }
    }

    load();
  </script>
</body>
</html>
