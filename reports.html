<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - Reports</title>
  <link rel="stylesheet" href="dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SGIS</h1><p>Smart Governance<br>Intelligence System</p></div>
    <div class="sidebar-user" id="sidebarUser"></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="admin-complaints.html">📋 All Complaints</a>
      <a href="assign-officer.html">➕ Assign Officer</a>
      <a href="manage-users.html">👥 Manage Users</a>
      <a href="reports.html" class="active">📄 Reports</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">
      <h2>Reports</h2>
      <div class="stats-container">
        <h3>System Summary</h3>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value total" id="rTotal">0</div></div>
          <div class="stat-card"><div class="stat-label">Submitted</div><div class="stat-value open" id="rSubmitted">0</div></div>
          <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value in-progress" id="rProgress">0</div></div>
          <div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-value resolved" id="rResolved">0</div></div>
        </div>
      </div>

      <div class="charts-row" style="margin-top:24px;">
        <div class="chart-card" style="flex:1;"><h3>Monthly Trend</h3><canvas id="barChart"></canvas></div>
        <div class="chart-card" style="flex:1;"><h3>Status Distribution</h3><canvas id="pieChart"></canvas></div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    requireAdmin();
    document.getElementById("sidebarUser").textContent = "logged in as: " + getUser().email;

    async function loadReports() {
      const result = await apiCall("/admin/reports");
      if (!result || !result.ok) { showAlert("Failed to load reports", true); return; }
      const d = result.data;

      document.getElementById("rTotal").textContent     = d.total || 0;
      document.getElementById("rSubmitted").textContent = d.submitted || 0;
      document.getElementById("rProgress").textContent  = d.inProgress || 0;
      document.getElementById("rResolved").textContent  = d.resolved || 0;

      const monthlyMap = d.monthly || {};
      const months = Object.keys(monthlyMap);
      const counts  = Object.values(monthlyMap);

      new Chart(document.getElementById("barChart"), {
        type: "bar",
        data: {
          labels: months.length ? months : ["No Data"],
          datasets: [{ label: "Complaints", data: counts.length ? counts : [0], backgroundColor: "#4e6b5e" }]
        },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      new Chart(document.getElementById("pieChart"), {
        type: "pie",
        data: {
          labels: ["Submitted", "In Progress", "Resolved"],
          datasets: [{ data: [d.submitted || 0, d.inProgress || 0, d.resolved || 0], backgroundColor: ["#f4a261", "#457b9d", "#2a9d8f"] }]
        },
        options: { responsive: true }
      });
    }

    loadReports();
  </script>
</body>
</html>
