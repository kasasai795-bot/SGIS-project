<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - My Complaints</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SGIS</h1><p>Smart Governance<br>Intelligence System</p></div>
    <div class="sidebar-user" id="sidebarUser"></div>
    <nav class="sidebar-nav">
      <a href="user-dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="my-complaints.html" class="active"><span class="nav-icon">📋</span> My Complaints</a>
      <a href="submit-complaint.html"><span class="nav-icon">+</span> Submit Complaint</a>
      <a href="profile.html"><span class="nav-icon">👤</span> Profile</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" onclick="logout()"><span class="nav-icon">🚪</span> Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">
      <div class="section-header">
        <h2>Your Complaints</h2>
        <a href="submit-complaint.html"><button class="btn-submit-new">+ New Complaint</button></a>
      </div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr><th>ID</th><th>Title</th><th>Category</th><th>Priority</th><th>Status</th><th>Date</th></tr>
          </thead>
          <tbody id="complaintsBody">
            <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    requireLogin();
    document.getElementById("sidebarUser").textContent = "logged in as: " + getUser().email;

    async function load() {
      const result = await apiCall("/my-complaints");
      if (!result || !result.ok) return;
      const tbody = document.getElementById("complaintsBody");
      const list = result.data || [];
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No complaints yet. <a href="submit-complaint.html">Submit one!</a></td></tr>';
        return;
      }
      tbody.innerHTML = list.map(c => `
        <tr>
          <td>${c._id.slice(-6).toUpperCase()}</td>
          <td>${c.title}</td>
          <td>${c.category}</td>
          <td>${c.priority || "Medium"}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${formatDate(c.createdAt)}</td>
        </tr>
      `).join("");
    }

    load();
  </script>
</body>
</html>
