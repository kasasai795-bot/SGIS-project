<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - Manage Users</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SGIS</h1><p>Smart Governance<br>Intelligence System</p></div>
    <div class="sidebar-user" id="sidebarUser"></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="admin-complaints.html">📋 All Complaints</a>
      <a href="assign-officer.html">➕ Assign Officer</a>
      <a href="manage-users.html" class="active">👥 Manage Users</a>
      <a href="reports.html">📄 View Reports</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">
      <div class="section-header"><h2>Manage Users</h2></div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th>Action</th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    requireAdmin();
    document.getElementById("sidebarUser").textContent = "logged in as: " + getUser().email;

    async function load() {
      const result = await apiCall("/admin/users");
      if (!result || !result.ok) return;
      const tbody = document.getElementById("usersBody");
      const users = result.data || [];
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No users found</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${u.name || "—"}</td>
          <td>${u.email}</td>
          <td><span class="status-badge ${u.role === 'ADMIN' ? 'resolved' : 'open'}">${u.role}</span></td>
          <td>${formatDate(u.createdAt)}</td>
          <td>${u.role !== 'ADMIN' ? `<button class="btn-view" onclick="deleteUser('${u._id}', '${u.email}')">Delete</button>` : '—'}</td>
        </tr>
      `).join("");
    }

    async function deleteUser(id, email) {
      if (!confirm(`Delete user: ${email}?`)) return;
      const result = await apiCall(`/admin/users/${id}`, "DELETE");
      if (result && result.ok) { showAlert("✅ User deleted"); load(); }
      else showAlert("Error deleting user", true);
    }

    load();
  </script>
</body>
</html>
