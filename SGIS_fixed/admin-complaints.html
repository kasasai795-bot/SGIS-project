<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGIS - All Complaints</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><h1>SGIS</h1><p>Smart Governance<br>Intelligence System</p></div>
    <div class="sidebar-user" id="sidebarUser"></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="admin-complaints.html" class="active">📋 All Complaints</a>
      <a href="assign-officer.html">➕ Assign Officer</a>
      <a href="manage-users.html">👥 Manage Users</a>
      <a href="reports.html">📄 View Reports</a>
    </nav>
    <div class="sidebar-bottom">
      <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-content">
      <div class="section-header"><h2>All Complaints</h2></div>

      <div style="margin-bottom:16px;">
        <select id="statusFilter" onchange="filterComplaints()" class="form-input" style="max-width:200px;">
          <option value="">All Statuses</option>
          <option>Submitted</option>
          <option>Assigned</option>
          <option>In Progress</option>
          <option>Resolved</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr><th>ID</th><th>Title</th><th>Category</th><th>Submitted By</th><th>Status</th><th>Date</th><th>Action</th></tr>
          </thead>
          <tbody id="complaintsBody">
            <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    requireAdmin();
    document.getElementById("sidebarUser").textContent = "logged in as: " + getUser().email;

    let allComplaints = [];

    async function load() {
      const result = await apiCall("/admin/complaints");
      if (!result || !result.ok) {
        document.getElementById("complaintsBody").innerHTML = '<tr><td colspan="7" style="text-align:center;">Error loading complaints</td></tr>';
        return;
      }
      allComplaints = result.data || [];
      renderTable(allComplaints);
    }

    function filterComplaints() {
      const filter = document.getElementById("statusFilter").value;
      const filtered = filter ? allComplaints.filter(c => c.status === filter) : allComplaints;
      renderTable(filtered);
    }

    function renderTable(list) {
      const tbody = document.getElementById("complaintsBody");
      if (!list || list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No complaints found</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(c => `
        <tr>
          <td>${c._id.slice(-6).toUpperCase()}</td>
          <td>${c.title}</td>
          <td>${c.category}</td>
          <td>${c.submittedBy || "—"}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${formatDate(c.createdAt)}</td>
          <td>
            <select onchange="updateStatus('${c._id}', this.value)" class="form-input" style="padding:4px 6px;font-size:12px;">
              <option value="">Change...</option>
              <option value="Submitted" ${c.status==="Submitted"?"selected":""}>Submitted</option>
              <option value="Assigned" ${c.status==="Assigned"?"selected":""}>Assigned</option>
              <option value="In Progress" ${c.status==="In Progress"?"selected":""}>In Progress</option>
              <option value="Resolved" ${c.status==="Resolved"?"selected":""}>Resolved</option>
            </select>
          </td>
        </tr>
      `).join("");
    }

    async function updateStatus(id, status) {
      if (!status) return;
      const result = await apiCall(`/admin/complaints/${id}/status`, "PUT", { status });
      if (result && result.ok) { showAlert("✅ Status updated!"); load(); }
      else showAlert("Failed to update status", true);
    }

    load();
  </script>
</body>
</html>
