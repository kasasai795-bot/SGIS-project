<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGIS — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-page">
  <div class="login-container">

    <header class="login-header">
      <h1 class="login-title">SGIS</h1>
      <p class="login-subtitle">Smart Governance Intelligence System</p>
    </header>

    <div class="login-card">
      <h2 class="login-card-title" id="formTitle">Login</h2>
      <div class="login-card-separator"></div>

      <!-- LOGIN -->
      <div id="loginSection">
        <form class="login-form" onsubmit="doLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required />
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>
      </div>

      <!-- REGISTER -->
      <div id="registerSection" style="display:none;">
        <form class="login-form" onsubmit="doRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" required />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" required />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" required />
          </div>

          <button type="submit" class="login-btn">Register</button>
        </form>
      </div>
    </div>

    <div class="login-links">
      <a href="#" onclick="toggleForm()">
        <span id="toggleText">Don't have an account? Register here</span>
      </a>
    </div>

  </div>

<script>
let isLogin = true;

/* ===== TOGGLE ===== */
function toggleForm() {
  isLogin = !isLogin;

  document.getElementById("loginSection").style.display = isLogin ? "block" : "none";
  document.getElementById("registerSection").style.display = isLogin ? "none" : "block";

  document.getElementById("formTitle").textContent = isLogin ? "Login" : "Register";

  document.getElementById("toggleText").textContent = isLogin
    ? "Don't have an account? Register here"
    : "Already have an account? Login here";
}

/* ===== LOGIN ===== */
async function doLogin(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    const res = await fetch("http://localhost:8080/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const text = await res.text(); // safer than res.json()
    let data;

    try {
      data = JSON.parse(text);
    } catch {
      console.error("Invalid JSON:", text);
      alert("❌ Server error (not JSON)");
      return;
    }

    console.log("LOGIN RESPONSE:", data);

    if (!data.ok) {
      alert("❌ " + (data.message || "Login failed"));
      return;
    }

    localStorage.setItem("user", JSON.stringify(data.data));

    // redirect
    if (data.data.role === "ADMIN") {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "user-dashboard.html";
    }

  } catch (err) {
    console.error(err);
    alert("❌ Server not responding");
  }
}

/* ===== REGISTER ===== */
async function doRegister(e) {
  e.preventDefault();

  const name = document.getElementById("regName").value;
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPassword").value;

  try {
    const res = await fetch("http://localhost:8080/api/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, password })
    });

    const text = await res.text();
    let data;

    try {
      data = JSON.parse(text);
    } catch {
      console.error("Invalid JSON:", text);
      alert("❌ Server error");
      return;
    }

    console.log("REGISTER RESPONSE:", data);

    if (!data.ok) {
      alert("❌ " + (data.message || "Register failed"));
      return;
    }

    alert("✅ Registered successfully!");
    toggleForm();

  } catch (err) {
    console.error(err);
    alert("❌ Server not responding");
  }
}
</script>

</body>
</html>
